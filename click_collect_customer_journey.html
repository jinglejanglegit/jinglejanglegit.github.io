
<style>
  @keyframes walk { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes walkL { 0%,100%{transform:translateY(0) scaleX(-1)} 50%{transform:translateY(-3px) scaleX(-1)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes slide { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pop { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes scanline { from{transform:translateY(0)} to{transform:translateY(60px)} }
  .figure { animation: walk 0.55s ease-in-out infinite; }
  .figure-rev { animation: walkL 0.55s ease-in-out infinite; transform-origin: 50% 50%; }
  .parcel { animation: bounce 1.2s ease-in-out infinite; }
  .slide-in { animation: slide 0.4s ease both; }
  .pop-in { animation: pop 0.3s cubic-bezier(.34,1.56,.64,1) both; }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  .scan { animation: scanline 1.2s linear infinite; }
  .step-btn {
    background: none; border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md); padding: 6px 14px;
    font-size: 13px; cursor: pointer; color: var(--color-text-primary);
    transition: background .15s;
  }
  .step-btn:hover { background: var(--color-background-secondary); }
  .step-btn:disabled { opacity: 0.35; cursor: default; }
  .step-btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .step-btn.primary:hover { opacity: 0.88; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); transition: background .3s; }
  .progress-dot.active { background: var(--color-text-primary); }
  .progress-dot.done { background: var(--color-border-primary); }
  .star-btn { background: none; border: none; font-size: 22px; cursor: pointer; opacity: 0.3; transition: opacity .15s, transform .15s; padding: 2px 4px; }
  .star-btn.lit { opacity: 1; }
  .star-btn:hover { transform: scale(1.2); opacity: 0.7; }
  .survey-opt { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer; font-size: 13px; transition: border-color .15s, background .15s; }
  .survey-opt:hover { border-color: var(--color-border-primary); background: var(--color-background-secondary); }
  .survey-opt.selected { border-color: var(--color-text-primary); background: var(--color-background-secondary); }
  .survey-opt input { accent-color: var(--color-text-primary); }
  .thank-badge { display: inline-block; background: var(--color-background-success); color: var(--color-text-success); border-radius: var(--border-radius-md); padding: 6px 16px; font-size: 13px; font-weight: 500; }
</style>

        <div class="pop-in" style="font-size:48px;margin-bottom:1rem">🎉</div>
        <div class="pop-in" style="animation-delay:0.15s;font-size:18px;font-weight:500;margin-bottom:8px">Thanks for your feedback!</div>
        <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1.5rem">Your response helps us improve the click &amp; collect experience for everyone.</div>
        <span class="thank-badge pop-in" style="animation-delay:0.3s">✓ Response submitted</span>
        <div style="margin-top:2rem;font-size:13px;color:var(--color-text-secondary)">Enjoy your parcel! 📦</div>
      </div>
    `
  }
];

let current = 0;

function starLabels(v) {
  return ['','Poor','Fair','Good','Great','Excellent!'][v]||'';
}

window.rateStar = function(v) {
  document.querySelectorAll('#stars .star-btn').forEach((b,i) => {
    b.classList.toggle('lit', i < v);
  });
  const el = document.getElementById('star-label');
  if(el) el.textContent = starLabels(v);
  window._starVal = v;
};

window.skipSurvey = function() {
  goTo(5);
};

window.submitSurvey = function() {
  goTo(5);
};

function renderDots() {
  const d = document.getElementById('dots');
  d.innerHTML = steps.map((s,i) => `<div class="progress-dot ${i===current?'active':i<current?'done':''}" title="${s.label}"></div>`).join('') +
    `<span style="font-size:12px;color:var(--color-text-secondary);margin-left:10px">${steps[current].label}</span>`;
}

function goTo(idx) {
  current = idx;
  render();
}

function render() {
  renderDots();
  const s = document.getElementById('scene');
  s.innerHTML = steps[current].render();
  if(steps[current].afterRender) setTimeout(steps[current].afterRender, 50);
  const nav = document.getElementById('nav');
  nav.innerHTML = `
    <button class="step-btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Back</button>
    <button class="step-btn primary" onclick="goTo(${current+1})" ${current===steps.length-1?'disabled':''}>Next →</button>
  `;
}

render();
</script>
